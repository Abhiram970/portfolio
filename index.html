<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Portfolio</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=JetBrains+Mono:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&family=Space+Mono:wght@400;700&family=Bricolage+Grotesque:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="mockups"></div>

<script src="data.js"></script>
<script src="mini-svgs.js"></script>
<script src="f1-eras.js"></script>
<script src="build-mockup.js"></script>
<script src="theme-editor.js"></script>

<script type="module">
  import "./motion.js";
</script>

<script type="module">
  const host = document.getElementById("mockups");
  const node = window.buildMockup(1, 1, "PORTFOLIO");
  host.appendChild(node);

  await new Promise(r => requestAnimationFrame(r));
  const start = performance.now();
  while (!window.initMockup && performance.now() - start < 4000) {
    await new Promise(r => setTimeout(r, 30));
  }
  if (window.initMockup) {
    try { window.initMockup(node, 1); } catch (err) { console.error("init", err); }
    // Trigger scroll listeners for elements already in the viewport
    setTimeout(() => window.dispatchEvent(new Event('scroll')), 120);
  }

  window.initThemeEditor();
</script>

</body>
</html>
